/* 見出し */

.status-value{

/* ======================
        MENU
====================== */


.menu-item{
    font-size:20px;
    padding:6px;
    margin:4px 0;
    border-radius:8px;
    transition:0.2s;
}


/* 選択中 */

.selected{

    background:

    color:
    #fff5d0;

}



/* マウスを乗せる */

.menu-item:hover{

    background:
    #a96e25;

    color:
    #fff9dd;


    transform:
    translateX(10px)
    scale(1.03);


    box-shadow:
    0 0 15px
    #fff4a0;

/* 押した瞬間 */

.menu-item:active{


    transform:
    translateX(5px)
    scale(0.96);


    box-shadow:
    inset 0 0 12px
    #000;

}



/* ======================
        RECORD
====================== */


.record{

#content{

    font-size:22px;
    line-height:1.8;

const menuItems = document.querySelectorAll(".menu-item");
let selectedIndex = 0;

function updateMenu() {
    menuItems.forEach(item => {
        item.classList.remove("selected");
        item.textContent = item.textContent.replace("▶ ", "");
    });

    menuItems[selectedIndex].classList.add("selected");
    menuItems[selectedIndex].textContent =
        "▶ " + menuItems[selectedIndex].textContent;
}

function openRecord() {
    const name = menuItems[selectedIndex]
        .textContent
        .replace("▶ ", "")
        .trim();

    const content = document.getElementById("content");

    content.innerHTML = records[name];

    if (window.twttr) {
        twttr.widgets.load(content);
    }
}

menuItems.forEach((item, index) => {
    item.addEventListener("click", () => {
        selectedIndex = index;
        updateMenu();
        openRecord();
    });
});

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") {
        selectedIndex--;
        if (selectedIndex < 0) selectedIndex = menuItems.length - 1;
        updateMenu();
    }

    if (e.key === "ArrowDown") {
        selectedIndex++;
        if (selectedIndex >= menuItems.length) selectedIndex = 0;
        updateMenu();
    }

    if (e.key === "Enter") {
        openRecord();
    }
});

updateMenu();

let secretCode = "";

document.addEventListener("keydown", (e) => {
    secretCode += e.key.toLowerCase();

    if (secretCode.includes("onemu")) {
        location.href = "onemu-game.html";
    }

    if (secretCode.length > 20) {
        secretCode = "";
    }
});
