<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}


body{

    height:100vh;
    overflow:hidden;


    /* 羊皮紙 */
    background:
    radial-gradient(
        circle at 20% 30%,
        rgba(255,255,220,0.7),
        transparent 25%
    ),

    radial-gradient(
        circle at 80% 70%,
        rgba(90,40,0,0.25),
        transparent 40%
    ),

    linear-gradient(
        135deg,
        #f2dfb1,
        #d2ab6f,
        #b47a3a
    );


    font-family:
    "Yu Mincho",
    "MS Mincho",
    serif;


    color:#3a2200;
}



/* タイトル */

.title{

    text-align:center;

    font-size:45px;

    margin-top:15px;

    color:#5b2d00;


    text-shadow:
    2px 2px #fff5c5;

}



/* 全体 */

.container{

    width:95%;

    height:85vh;

    margin:20px auto;

    display:flex;

    gap:20px;

}



/* 左右 */

.left{
    width:30%;
    height:100%;
    overflow-y:auto;
    padding-right:5px;
}

.right{

    width:70%;

}



/* 古書のページ */

.window{


    background:
    linear-gradient(
        #f9eccd,
        #d8b67a
    );


    border:
    7px solid #6b3b0c;


    border-radius:18px;


    box-shadow:

    inset 0 0 25px #fff7d5,

    0 0 15px #593000;


    padding:15px;

    margin-bottom:15px;

}



/* 見出し */

h2{

    border-bottom:
    3px solid #7b4a18;


    padding-bottom:8px;


    margin-bottom:12px;


    color:#4a2500;

}



/* STATUSカード */

.status-card{


    background:
    rgba(255,245,210,0.7);


    border:
    3px solid #8a5a22;


    border-radius:10px;


    padding:10px;


    margin:12px 0;


    box-shadow:
    inset 0 0 10px #fff;


}


.status-title{


    font-size:18px;


    color:#5a3000;


}


.status-value{


    font-size:24px;


    margin-top:5px;


    font-weight:bold;

}

/* ======================
        MENU
====================== */


.menu-item{
    font-size:20px;
    padding:6px;
    margin:4px 0;


/* 選択中 */

.selected{

    background:
    #8b5a20;

    color:
    #fff5d0;

}



/* マウスを乗せる */

.menu-item:hover{

    background:
    #a96e25;

    color:
    #fff9dd;


    transform:
    translateX(10px)
    scale(1.03);


    box-shadow:
    0 0 15px
    #fff4a0;

}


/* 押した瞬間 */

.menu-item:active{


    transform:
    translateX(5px)
    scale(0.96);


    box-shadow:
    inset 0 0 12px
    #000;

}



/* ======================
        RECORD
====================== */


.record{

    height:100%;

    overflow-y:auto;

}


#content{


    font-size:22px;

    line-height:1.8;

    white-space:pre-line;

}



/* ======================
        FOOTER
====================== */


.footer{

    position:fixed;

    right:25px;

    bottom:10px;


    color:#5a3000;

    font-style:italic;

    font-size:18px;

}

.gallery-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;

    max-height: 500px;
    overflow-y: auto;

    padding: 10px;
}


.gallery-grid img {

    width: 180px;
    height: 250px;

    object-fit: cover;

    border-radius: 10px;

    border: 3px solid #8a5a22;

    box-shadow:
        0 0 10px rgba(0,0,0,0.5);

    transition: 0.2s;
}


/* マウスを乗せた時 */
.gallery-grid img:hover {

    transform: scale(1.1);

    box-shadow:
        0 0 20px #fff3a0;

    cursor: pointer;
}

.record-card{
    border: 3px solid #8a5a22;
    border-radius: 12px;
    background: rgba(255,245,210,0.75);
    padding: 14px;
    margin: 14px 0;
    box-shadow:
        inset 0 0 12px #fff8d8,
        0 3px 8px rgba(60,30,0,0.35);

.record-label{
    font-size: 16px;
    color: #6b3b0c;
    letter-spacing: 2px;
    border-bottom: 1px solid #8a5a22;
    padding-bottom: 4px;
    margin-bottom: 8px;
}

.record-value{
    font-size: 24px;

const menuItems = document.querySelectorAll(".menu-item");
let selectedIndex = 0;

function updateMenu() {
    menuItems.forEach(item => {
        item.classList.remove("selected");
        item.textContent = item.textContent.replace("▶ ", "");
    });

    menuItems[selectedIndex].classList.add("selected");
    menuItems[selectedIndex].textContent =
        "▶ " + menuItems[selectedIndex].textContent;
}

function openRecord() {
    const name = menuItems[selectedIndex]
        .textContent
        .replace("▶ ", "")
        .trim();

    const content = document.getElementById("content");

    content.innerHTML = records[name];

    if (window.twttr) {
        twttr.widgets.load(content);
    }
}

menuItems.forEach((item, index) => {
    item.addEventListener("click", () => {
        selectedIndex = index;
        updateMenu();
        openRecord();
    });
});

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") {
        selectedIndex--;
        if (selectedIndex < 0) selectedIndex = menuItems.length - 1;
        updateMenu();
    }

    if (e.key === "ArrowDown") {
        selectedIndex++;
        if (selectedIndex >= menuItems.length) selectedIndex = 0;
        updateMenu();
    }

    if (e.key === "Enter") {
        openRecord();
    }
});

updateMenu();

let secretCode = "";

document.addEventListener("keydown", (e) => {
    secretCode += e.key.toLowerCase();

    if (secretCode.includes("onemu")) {
        location.href = "onemu-game.html";
    }

    if (secretCode.length > 20) {
        secretCode = "";
    }
