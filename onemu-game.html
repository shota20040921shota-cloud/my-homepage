<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>
青野はおねむ中 シューティング
</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:sans-serif;
    color:white;
}


/*====================
        UI
====================*/

#ui{
    position:fixed;
    top:10px;
    left:10px;
    font-size:22px;
    z-index:10;
    text-shadow:0 0 10px cyan;
}


/*====================
      HIGH SCORE
====================*/

#highScore{
    color:gold;
}


/*====================
      ENEMY
====================*/

.enemy,
.boss{
    position:absolute;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    text-shadow:0 0 15px currentColor;
}


.enemy{
    font-size:30px;
}


.boss{
    font-size:80px;
}


/*====================
       HP BAR
====================*/

.hpbar{
    position:absolute;
    height:14px;
    background:red;
    box-shadow:0 0 15px red;
    z-index:5;
}


/*====================
       RESULT
====================*/

#result{
    display:none;

    position:fixed;
    inset:0;

    background:
    rgba(0,0,0,0.92);

    z-index:100;

    text-align:center;

    padding-top:160px;
}


#result h1{

    font-size:60px;

    color:gold;

    text-shadow:
    0 0 25px gold;

}


#result p{

    font-size:28px;

}


button{

    font-size:22px;

    padding:12px 24px;

    margin:15px;

    cursor:pointer;

    border-radius:10px;

}

</style>

</head>


<body>


<!--====================
          UI
=====================-->

<div id="ui">

SCORE :
<span id="score">0</span>

<br>

TIME :
<span id="time">
120
</span>

秒


<br>


BEST :
<span id="highScore">
0
</span>

</div>


<!--====================
       RESULT
=====================-->

<div id="result">

<h1>
RESULT
</h1>


<p>

最終スコア :

<span id="finalScore">
0
</span>

</p>


<p id="rank">
</p>


<button onclick="location.reload()">

もう一度遊ぶ

</button>


<button onclick="location.href='index.html'">

記録書へ戻る

</button>


</div>



<script>


/*====================
      GAME DATA
====================*/


let score = 0;


let time = 120;


let speed = 2;


let bossActive = false;


let gameOver = false;


/* BGM開始判定 */

let bgmStarted = false;


/*====================
       DOM
====================*/


const scoreEl =
document.getElementById("score");


const timeEl =
document.getElementById("time");


const result =
document.getElementById("result");


const finalScore =
document.getElementById("finalScore");


const rankEl =
document.getElementById("rank");


const highScoreEl =
document.getElementById("highScore");


/* ハイスコア表示 */

let best =
localStorage.getItem("onemuHighScore")
|| 0;


highScoreEl.textContent = best;


/*====================
       ENEMY
====================*/


function createEnemy(){


if(bossActive || gameOver)
return;


const el =
document.createElement("div");


el.className =
"enemy";


el.textContent =
"青野はおねむ中";


el.x =
Math.random()
*
(window.innerWidth-220);


el.y =
Math.random()
*
(window.innerHeight-80);


el.vx =
(Math.random()-0.5)
* speed * 2;


el.vy =
(Math.random()-0.5)
* speed * 2;


el.style.color =
`hsl(${Math.random()*360},100%,60%)`;



/*====================
    ENEMY CLICK
====================*/


el.addEventListener(
"click",

()=>{


/* 初撃破BGM */

if(!bgmStarted){


const bgm =
document.getElementById("bgm");


if(bgm){

bgm.volume = 0.3;


bgm.play();

}


bgmStarted = true;


}


/* 撃破SE */


const sound =
document.getElementById("hitSound");


if(sound){

sound.currentTime = 0;


sound.play();

}
    /* スコア加算 */

score++;


scoreEl.textContent = score;


/* 敵削除 */

el.remove();


/* 新しい敵生成 */

createEnemy();


}); // 敵クリック終了



document.body.appendChild(el);


moveEnemy(el);


}



/*====================
       BOSS
====================*/


function spawnBoss(){


if(gameOver || bossActive)
return;


/* ボス出現中は雑魚削除 */

bossActive = true;


document
.querySelectorAll(".enemy")
.forEach(e=>e.remove());


const boss =
document.createElement("div");


boss.className =
"boss";


boss.textContent =
"💤青野はおねむ中💤";


boss.x =
window.innerWidth/2-250;


boss.y =
window.innerHeight/2-80;


boss.vx = 4;


boss.vy = 4;


/* HP */

boss.hp = 50;


boss.style.color =
"red";


/* HPバー */

const hpbar =
document.createElement("div");


hpbar.className =
"hpbar";


hpbar.style.width =
boss.hp * 5 + "px";


document.body.appendChild(hpbar);



/*====================
       BOSS CLICK
====================*/


boss.addEventListener(
"click",

()=>{


/* 被弾SE */


const hit =
document.getElementById("bossHitSound");


if(hit){

hit.currentTime = 0;


hit.play();

}



/* HP減少 */


boss.hp--;


hpbar.style.width =
boss.hp * 5 + "px";


/*====================
      BOSS DEAD
====================*/


if(boss.hp <= 0){


/* 撃破SE */


const clear =
document.getElementById("clearSound");


if(clear){

clear.currentTime = 0;


clear.play();

}



/* ボス削除 */


boss.remove();


hpbar.remove();


bossActive = false;



/* ボーナス */


score += 20;


scoreEl.textContent =
score;


/* 雑魚再開 */


for(
let i = 0;
i < 3;
i++
){

createEnemy();

}


}


}); // ボスクリック終了



document.body.appendChild(boss);



/*====================
      BOSS MOVE
====================*/


function moveBoss(){


if(
gameOver ||
!document.body.contains(boss)
)
return;



boss.x += boss.vx;


boss.y += boss.vy;



/* 壁反射 */


if(
boss.x < 0 ||
boss.x > window.innerWidth - 500
)

boss.vx *= -1;



if(
boss.y < 0 ||
boss.y > window.innerHeight - 120
)

boss.vy *= -1;



/* 移動 */


boss.style.transform =
`translate(${boss.x}px, ${boss.y}px)`;


/* HPバー追従 */


hpbar.style.left =
boss.x + "px";


hpbar.style.top =
boss.y - 20 + "px";



requestAnimationFrame(
moveBoss
);


}


moveBoss();


}
    /*====================
      ENEMY MOVE
====================*/

function moveEnemy(el){

    function update(){

        if(
            gameOver ||
            !document.body.contains(el)
        ) return;


        el.x += el.vx;
        el.y += el.vy;


        /* 壁反射 */

        if(
            el.x < 0 ||
            el.x > window.innerWidth - 220
        ){
            el.vx *= -1;
        }


        if(
            el.y < 0 ||
            el.y > window.innerHeight - 60
        ){
            el.vy *= -1;
        }


        /* 移動 */

        el.style.transform =
        `translate(${el.x}px, ${el.y}px)`;


        requestAnimationFrame(update);

    }


    update();

}


/*====================
      GAME START
====================*/


for(let i = 0; i < 5; i++){

    createEnemy();

}


/*====================
       TIMER
====================*/


const timer = setInterval(()=>{


    if(gameOver) return;


    time--;


    timeEl.textContent = time;


    if(time <= 0){

        endGame();

    }


},1000);



/*====================
      BOSS TIMER
====================*/


const bossTimer = setInterval(()=>{


    if(
        !bossActive &&
        !gameOver
    ){

        spawnBoss();

    }


},30000);



/*====================
      GAME END
====================*/


function endGame(){


    gameOver = true;


    clearInterval(timer);

    clearInterval(bossTimer);


    /* 敵を消す */

    document
    .querySelectorAll(
        ".enemy, .boss, .hpbar"
    )
    .forEach(
        e => e.remove()
    );


    /* スコア表示 */

    finalScore.textContent = score;


    /* ハイスコア更新 */

    if(score > best){

        best = score;


        localStorage.setItem(
            "onemuHighScore",
            best
        );


        highScoreEl.textContent = best;

    }


    /* ランク */

    if(score >= 150){

        rankEl.textContent =
        "👑 称号：睡眠神";

    }

    else if(score >= 100){

        rankEl.textContent =
        "🌙 称号：睡眠の支配者";

    }

    else if(score >= 70){

        rankEl.textContent =
        "✨ 称号：快眠マスター";

    }

    else{

        rankEl.textContent =
        "😪 称号：眠い人";

    }


    /* RESULT表示 */

    result.style.display =
    "block";

}


</script>



<!--====================
          SOUND
=====================-->


<!-- BGM -->

<audio id="bgm" loop>

<source
src="onemu_bgm.mp3"
type="audio/mpeg">

</audio>



<!-- 雑魚撃破 -->

<audio id="hitSound">

<source
src="hit.mp3"
type="audio/mpeg">

</audio>



<!-- ボス被弾 -->

<audio id="bossHitSound">

<source
src="hit.mp3"
type="audio/mpeg">

</audio>



<!-- ボス撃破 -->

<audio id="clearSound">

<source
src="clear.mp3"
type="audio/mpeg">

</audio>


</body>

</html>
